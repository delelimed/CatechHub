# 1. Gestione Memoria Ottimizzata
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:+UseG1GC
org.gradle.parallel=false
org.gradle.daemon=true
org.gradle.caching=true

# 2. Compatibilità Android 10+ con AGP stabile
android.useAndroidX=true
android.suppressUnsupportedCompileSdk=36

# Rimosso il flag deprecato android.enableDexingArtifactTransform che generava il warning

# 3. Configurazione Ambiente Flutter
flutter.deferred-components=false

# COMMENTATO: Rimuoviamo JDK 25 per evitare il NullPointerException del plugin Flutter
# org.gradle.java.home=C:/Dev/Java/jdk-25.0.3+9
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
