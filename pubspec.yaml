name: CatechHub
description: "Il tuo registro di catechismo"
publish_to: 'none'
license: MIT

version: 1.2.4+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Gestione Stato e Navigazione
  flutter_riverpod: ^2.6.1       # Aggiornato alla patch più stabile della v2
  go_router: ^17.2.3             # Massima compatibile con il tuo SDK
  local_auth: ^3.0.1             # Aggiornato (Risolvibile indica stabilità nativa Android/iOS)

  # Database Locale e Crittografia
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1 # Aggiornato alla massima build stabile per la tua toolchain
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Scambio Dati (backup futuro)
  file_picker: ^12.0.0-beta.4            # Aggiornato all'ultima release stabile nativa
  archive: ^4.0.9                # Lasciato a 3.6.1 per evitare i breaking changes della v4.0 (richiede SDK Dart più alto)
  
  # QR Code e Scansione Offline
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0         # Aggiornato all'ultima build stabile compatibile

  # UI e Utility
  intl: ^0.20.2                 
  url_launcher: ^6.3.0
  http: ^1.2.0
  package_info_plus: ^10.1.0      # Aggiornato
  device_info_plus: ^13.1.0      # Aggiornato
  permission_handler: ^12.0.1    # Aggiornato
  flutter_local_notifications: ^21.0.0 # Aggiornato (importante per Android 14)
  pdf: ^3.10.8
  printing: ^5.11.0
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  wiredash: ^2.6.1
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  image: ^4.3.0                  # Aggiornato
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0          
  hive_generator: ^2.0.1
  build_runner: ^2.4.13          

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
